    <meta property="og:site_name" content="AML North" />
    <meta property="og:title" content="AML North" />
    <meta
      property="og:description"
      content="Canada-first AML and financial-crime careers: a live jobs feed, Report Studio for FINTRAC reports, and certification guidance."
    />
    <meta property="og:url" content="https://amlnorth.ca/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AML North" />
    <meta
      name="twitter:description"
      content="Canada-first AML and financial-crime careers: a live jobs feed, Report Studio, and certification guidance."
    />
  </head>

    <script type="module" src="/src/main.tsx"></script>
